<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>المجموعة المثالية - صيانة أفران الغاز</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f8ff 0%, #cce7ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      min-height: 100vh;
      margin: 0;
      color: #333;
      padding: 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      color: #1a73e8;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    p {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .service-image {
      width: 300px;
      max-width: 90%;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 30px;
      color: white;
      font-size: 22px;
      font-weight: bold;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .action-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .whatsapp-btn {
      background-color: #25D366;
    }
    .call-btn {
      background-color: #1a73e8;
    }
    .action-btn img {
      width: 28px;
      height: 28px;
    }
  </style>
</head>
<body>
  <h1>المجموعة المثالية</h1>
  <h2>صيانة أفران الغاز</h2>
  <img src="https://images.unsplash.com/photo-1590456839295-0033a930c8c8?auto=format&fit=crop&w=600&q=80" alt="صيانة أفران الغاز" class="service-image">
  <p>للتواصل مع المهندس مباشرة، استخدم أحد الأزرار أدناه:</p>

  <div class="button-container">
    <!-- زر واتساب -->
    <a href="https://wa.me/966538721671" class="action-btn whatsapp-btn" target="_blank">
      <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
      53 872 1671
    </a>

    <!-- زر الاتصال الهاتفي -->
    <a href="tel:+966538721671" class="action-btn call-btn">
      📞 53 872 1671 - للاتصال والحجز
    </a>
  </div>
</body>
</html>
